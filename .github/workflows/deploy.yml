name: Deploy to ALL-INKL

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORT }}
          protocol: ftps
          port: 21
          server-dir: /kindermagicshow.de/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            DEPLOYMENT-BRIEFING-ALL-INKL.md
